<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Генератор конфигураций AmneziaWG с поддержкой WARP">
    <meta name="theme-color" content="#00ff64">
    <title>AmneziaWG Config Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>⚡ Генератор конфигураций для AmneziaWG ⚡</h1>
        <p class="subtitle">Клиент должен поддерживать протокол AmneziaWG 1.5 или выше!!!</p>
                
        <div class="buttons-grid">
            <button id="generateButton1" class="config-button">
                <span class="button-icon">🖥️</span>
                <div class="button-content">
                    <span class="button-title">AmneziaWG (ПК)</span>
                    <span class="button-desc">Оптимально для ПК и ноутбуков</span>
                </div>
                <span class="button__text">Скачать</span>
            </button>

            <button id="generateButton2" class="config-button">
                <span class="button-icon">📱</span>
                <div class="button-content">
                    <span class="button-title">AmneziaWG (Телефон)</span>
                    <span class="button-desc">Оптимально для смартфонов</span>
                </div>
                <span class="button__text">Скачать</span>
            </button>
        </div>

        <div id="status" class="status"></div>
        <div id="info" class="info">✨ Нажмите на кнопку для генерации конфигурации</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
