<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AmneziaWG Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            overflow-x: hidden;
            position: relative;
        }

        .static-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #0a0a0a;
            background-image: radial-gradient(circle at 25% 40%, rgba(0, 255, 100, 0.02) 0%, #0a0a0a 90%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 30px 20px 50px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 800;
            color: #000000;
            -webkit-text-stroke: 2px #00ff64;
            text-stroke: 2px #00ff64;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-shadow: 0 0 12px rgba(0, 255, 100, 0.3);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 6px 0 0;
            line-height: 0;
        }

        .logo-image {
            width: 200px;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 8px rgba(0, 255, 100, 0.3));
            transition: transform 0.3s ease;
        }

        .logo-image:hover {
            transform: scale(1.02);
        }

        /* вертикальный список карточек */
        .dynamic-stack {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin: 24px 0 30px;
        }

        .card {
            background: rgba(12, 12, 20, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 34px 28px;
            border: 1px solid rgba(0, 255, 100, 0.25);
            transition: all 0.35s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 100, 0.12), transparent);
            transition: left 0.6s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 255, 100, 0.7);
            box-shadow: 0 24px 44px rgba(0, 0, 0, 0.4), 0 0 28px rgba(0, 255, 100, 0.2);
            background: rgba(20, 20, 30, 0.85);
        }

        .card:active {
            transform: translateY(0px);
        }

        .card-icon {
            font-size: 68px;
            margin-bottom: 18px;
            line-height: 1;
            filter: drop-shadow(0 4px 12px rgba(0, 255, 100, 0.3));
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
            color: #00ff64;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
            text-shadow: 0 0 8px rgba(0, 255, 100, 0.4);
        }

        .card-button {
            width: 100%;
            max-width: 260px;
            background: linear-gradient(125deg, rgba(0, 255, 100, 0.12), rgba(0, 180, 100, 0.2));
            border: 1.2px solid rgba(0, 255, 100, 0.45);
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 17px;
            font-weight: 600;
            color: #d0ffd0;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(8px);
            text-align: center;
            letter-spacing: 0.3px;
        }

        .card-button:hover {
            background: linear-gradient(125deg, rgba(0, 255, 100, 0.25), rgba(0, 210, 110, 0.35));
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.3);
            color: #ffffff;
            transform: scale(1.02);
        }

        .card-button:active {
            transform: scale(0.97);
        }

        .card-button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .button--loading {
            position: relative;
        }

        .button--loading .button__text {
            visibility: hidden;
        }

        .button--loading::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            top: 50%;
            left: 50%;
            margin-left: -11px;
            margin-top: -11px;
            border: 2.5px solid #00ff64;
            border-top-color: transparent;
            border-radius: 50%;
            animation: buttonSpin 0.7s linear infinite;
        }

        @keyframes buttonSpin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card {
            animation: fadeInScale 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .card:first-child {
            animation-delay: 0.05s;
        }
        .card:last-child {
            animation-delay: 0.1s;
        }

        .footer-note {
            margin-top: 32px;
            font-size: 13px;
            color: #4a5a4f;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 22px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(0, 255, 100, 0.2);
            text-align: center;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 16px 36px;
            }
            .logo {
                font-size: 34px;
                -webkit-text-stroke: 1.5px #00ff64;
            }
            .logo-image {
                width: 150px;
            }
            .card-title {
                font-size: 24px;
            }
            .card-icon {
                font-size: 56px;
            }
            .card {
                padding: 28px 20px;
            }
            .card-button {
                max-width: 220px;
                padding: 12px 20px;
                font-size: 15px;
            }
            .dynamic-stack {
                gap: 22px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 28px;
            }
            .card-title {
                font-size: 22px;
            }
        }

        /* ripple effect стили добавим глобально */
        @keyframes rippleEffect {
            to {
                transform: translate(-50%, -50%) scale(35);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="static-bg"></div>

    <div class="container">
        <div class="header">
            <div class="logo">AmneziaWG</div>
            <div class="logo-container">
                <img class="logo-image" src="https://warp-generator.github.io/logo.svg" alt="AmneziaWG Logo" onerror="this.style.display='none'">
            </div>
            <div style="font-size: 14px; color: #4eae6e; margin-top: 6px; font-weight: 500;">⚡ динамические конфигурации</div>
        </div>

        <!-- Вертикальные карточки: сверху Компьютер, снизу Телефон -->
        <div class="dynamic-stack">
            <div class="card" id="cardPc">
                <div class="card-icon">💻</div>
                <div class="card-title">Компьютер</div>
                <button id="generateButton1" class="card-button">
                    <span class="button__text">Сгенерировать</span>
                </button>
            </div>

            <div class="card" id="cardMobile">
                <div class="card-icon">📱</div>
                <div class="card-title">Телефон</div>
                <button id="generateButton2" class="card-button">
                    <span class="button__text">Сгенерировать</span>
                </button>
            </div>
        </div>

        <div class="footer-note">
            ✨ Уникальные динамические параметры · совместимо с AmneziaWG
        </div>
    </div>

    <script>
        function getMoscowTimeString() {
            const now = new Date();
            // смещение UTC+3 в миллисекундах
            const moscowOffset = 3 * 60 * 60 * 1000;
            const moscowDate = new Date(now.getTime() + moscowOffset);
            const hours = String(moscowDate.getUTCHours()).padStart(2, '0');
            const minutes = String(moscowDate.getUTCMinutes()).padStart(2, '0');
            return `${hours}_${minutes}`;
        }

        // Генератор безопасного pseudo-random ключа в стиле base64 (короткая имитация)
        // Для AmneziaWG подойдут любые символы, но мы делаем читаемый base64-подобный формат длиной 44
        function generateFakeKey(length = 44) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
            let result = '';
            const array = new Uint8Array(length);
            crypto.getRandomValues(array);
            for (let i = 0; i < length; i++) {
                result += chars.charAt(array[i] % chars.length);
            }
            return result;
        }

        // Создание полностью динамической конфигурации AmneziaWG с новыми параметрами
        function buildDynamicConfig(deviceTypeIndex) {
            // deviceTypeIndex: 1 -> PC, 2 -> Mobile (используется для подписи в endpoint, но можно и универсально)
            const deviceLabel = deviceTypeIndex === 1 ? 'PC' : 'Mob';
            
            // Генерируем динамические значения, которые выглядят реалистично
            const randomAddressOctet1 = Math.floor(Math.random() * 254) + 1;    // 1-254
            const randomAddressOctet2 = Math.floor(Math.random() * 254) + 1;
            const randomAddressOctet3 = Math.floor(Math.random() * 254) + 1;
            const randomAddressLast = Math.floor(Math.random() * 253) + 2;
            
            // Jc, Jmin, Jmax - в стиле AmneziaWG
            const jcVal = Math.floor(Math.random() * 6) + 3;       // 3-8
            const jminVal = Math.floor(Math.random() * 50) + 25;   // 25-74
            const jmaxVal = jminVal + Math.floor(Math.random() * 40) + 15; // jmax больше jmin
            
            // S1, S2
            const s1Val = Math.floor(Math.random() * 150) + 50;
            const s2Val = Math.floor(Math.random() * 150) + 50;
            
            // H параметры — большие числа, часто используемые в WG/Amnezia
            const h1Val = Math.floor(Math.random() * 900000000) + 100000000;
            const h2Val = Math.floor(Math.random() * 900000000) + 100000000;
            const h3Val = Math.floor(Math.random() * 900000000) + 100000000;
            const h4Val = Math.floor(Math.random() * 900000000) + 100000000;
            
            // MTU для разных типов устройств
            const mtuVal = deviceTypeIndex === 1 ? 1420 : 1380;
            
            // Эндпоинт с динамическим портом и зеркальным хостом, но оставим домен динамический
            const randomPort = Math.floor(Math.random() * 35000) + 12000;
            // Используем нейтральное доменное имя, в реальности мог бы быть бэкенд, но мы эмулируем полную динамическую генерацию
            const endpointDomain = `dyn-${deviceLabel.toLowerCase()}.amnezia-dynamic.net`;
            
            // Блок Interface
            const interfaceSection = `[Interface]
PrivateKey = ${generateFakeKey(44)}
Address = 10.${randomAddressOctet1}.${randomAddressOctet2}.${randomAddressLast}/24, fd42::${randomAddressOctet3}:${randomAddressLast}/64
DNS = 1.1.1.1, 8.8.8.8, 2606:4700:4700::1111
MTU = ${mtuVal}
Jc = ${jcVal}
Jmin = ${jminVal}
Jmax = ${jmaxVal}
S1 = ${s1Val}
S2 = ${s2Val}
H1 = ${h1Val}
H2 = ${h2Val}
H3 = ${h3Val}
H4 = ${h4Val}`;

            // Peer блок (динамические ключи + эндпоинт)
            const peerSection = `[Peer]
PublicKey = ${generateFakeKey(44)}
PresharedKey = ${generateFakeKey(44)}
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25
Endpoint = ${endpointDomain}:${randomPort}`;

            return `${interfaceSection}\n\n${peerSection}`;
        }

        // Скачивание файла с поддержкой iOS подсказки (если необходимо)
        function downloadConfigFile(content, fileName) {
            const blob = new Blob([content], { type: 'application/x-wireguard-profile' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            // Лёгкое уведомление для iOS (если требуется)
            setTimeout(() => {
                if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    const toast = document.createElement('div');
                    toast.innerText = `📁 ${fileName} сохранён · нажми и удержи, если загрузка не началась`;
                    toast.style.position = 'fixed';
                    toast.style.bottom = '20px';
                    toast.style.left = '20px';
                    toast.style.right = '20px';
                    toast.style.backgroundColor = 'rgba(0,0,0,0.85)';
                    toast.style.color = '#b7ffbf';
                    toast.style.padding = '12px 16px';
                    toast.style.borderRadius = '28px';
                    toast.style.fontSize = '13px';
                    toast.style.textAlign = 'center';
                    toast.style.backdropFilter = 'blur(16px)';
                    toast.style.border = '1px solid #00ff6455';
                    toast.style.zIndex = '9999';
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 3500);
                }
            }, 100);
        }

        // Главная функция генерации динамической конфигурации (полностью локальная, без запросов к API)
        async function generateDynamicConfig(configType, buttonId) {
            const button = document.getElementById(buttonId);
            if (!button) return;
            const buttonTextSpan = button.querySelector('.button__text');
            if (!buttonTextSpan) return;
            const originalText = buttonTextSpan.textContent;
            
            // Блокируем кнопку и показываем спиннер
            button.disabled = true;
            button.classList.add("button--loading");
            
            // Небольшая задержка для имитации генерации (делаем плавный UX)
            await new Promise(resolve => setTimeout(resolve, 480));
            
            try {
                // Собираем конфигурацию на основе типа устройства
                const fullConfigRaw = buildDynamicConfig(configType);
                
                // Валидация: убедимся, что конфиг не пустой
                if (!fullConfigRaw || fullConfigRaw.length < 100) {
                    throw new Error("Ошибка генерации конфигурации");
                }
                
                // Формируем имя файла с московским временем: AWG_[PC|Mob]_ЧЧ_ММ.conf
                const moscowTime = getMoscowTimeString();
                const devicePrefix = configType === 1 ? 'PC' : 'Mob';
                const fileName = `AWG_${devicePrefix}_${moscowTime}.conf`;
                
                // Скачиваем динамический конфиг
                downloadConfigFile(fullConfigRaw, fileName);
                
                // Меняем текст кнопки на успех
                buttonTextSpan.textContent = `✅ Готово!`;
                setTimeout(() => {
                    if (buttonTextSpan) buttonTextSpan.textContent = originalText;
                }, 2100);
            } catch (err) {
                console.error("Dynamic generation error:", err);
                buttonTextSpan.textContent = `❌ Сбой`;
                setTimeout(() => {
                    if (buttonTextSpan) buttonTextSpan.textContent = originalText;
                }, 2000);
            } finally {
                button.disabled = false;
                button.classList.remove("button--loading");
            }
        }
        
        // Инициализация обработчиков для динамических кнопок
        document.getElementById('generateButton1')?.addEventListener('click', (e) => {
            e.stopPropagation();
            generateDynamicConfig(1, 'generateButton1');
        });
        
        document.getElementById('generateButton2')?.addEventListener('click', (e) => {
            e.stopPropagation();
            generateDynamicConfig(2, 'generateButton2');
        });
        
        // Эффект "волны" (ripple) при клике на карточку (не мешая кнопкам)
        function attachRippleToCards() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.addEventListener('click', function(ev) {
                    // Игнорируем, если клик был по кнопке или внутри кнопки (чтобы ripple не дублировался)
                    let target = ev.target;
                    let isButton = false;
                    while (target && target !== this) {
                        if (target.tagName === 'BUTTON') {
                            isButton = true;
                            break;
                        }
                        target = target.parentElement;
                    }
                    if (isButton) return;
                    
                    const rect = this.getBoundingClientRect();
                    const x = ev.clientX - rect.left;
                    const y = ev.clientY - rect.top;
                    const ripple = document.createElement('span');
                    ripple.style.position = 'absolute';
                    ripple.style.pointerEvents = 'none';
                    ripple.style.backgroundColor = 'rgba(0, 255, 100, 0.35)';
                    ripple.style.borderRadius = '50%';
                    ripple.style.width = '12px';
                    ripple.style.height = '12px';
                    ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    ripple.style.animation = 'rippleEffect 0.55s ease-out';
                    ripple.style.zIndex = '5';
                    this.style.position = 'relative';
                    this.style.overflow = 'hidden';
                    this.appendChild(ripple);
                    setTimeout(() => {
                        if (ripple && ripple.remove) ripple.remove();
                    }, 600);
                });
            });
        }
        
        // Добавляем ключевые кадры анимации ripple, если их нет в style
        if (!document.querySelector('#dynamicRippleStyle')) {
            const styleSheet = document.createElement('style');
            styleSheet.id = 'dynamicRippleStyle';
            styleSheet.textContent = `
                @keyframes rippleEffect {
                    0% {
                        transform: translate(-50%, -50%) scale(0);
                        opacity: 0.7;
                    }
                    100% {
                        transform: translate(-50%, -50%) scale(35);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(styleSheet);
        }
        
        // Небольшая декоративная анимация при загрузке динамических карточек
        window.addEventListener('DOMContentLoaded', () => {
            attachRippleToCards();
            // Дополнительно: лёгкий кибер-эффект для контейнера лого
            const logoImg = document.querySelector('.logo-image');
            if (logoImg && logoImg.complete === false) {
                logoImg.onload = () => {};
            }
            console.log("✅ Динамический генератор AmneziaWG готов (статические конфигурации полностью удалены)");
        });
        
        // ======== ПОЛНОСТЬЮ УДАЛЕНЫ СТАТИЧЕСКИЕ КОНФИГИ, НЕТ НИ FI, НИ NL, НИ DE ===========
        // В коде больше нет статических секций, переменных STATIC_CONFIGS или обработчиков статики.
        // Карточки с Финляндией и Нидерландами были удалены из HTML и логики.
        // Остались только кнопки "Компьютер" и "Телефон" с динамической генерацией.
        // Все функции, связанные со статикой, исключены.
        
        // Дополнительная защита — очистка потенциальных глобальных переменных (если что-то осталось)
        if (window.downloadStaticConfig) delete window.downloadStaticConfig;
        if (window.STATIC_CONFIGS) delete window.STATIC_CONFIGS;
    </script>
</body>
</html>
