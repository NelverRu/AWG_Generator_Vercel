<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AmneziaWG Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            overflow-x: hidden;
        }

        .static-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 800;
            color: #000000;
            -webkit-text-stroke: 2px #00ff64;
            text-stroke: 2px #00ff64;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .logo-image {
            width: 260px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

       .dynamic-stack {
           width: 100%;
           max-width: 800px;  
           display: flex;
           flex-direction: row; 
           gap: 30px;
           margin-bottom: 30px;
           justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 40px 24px;
            border: 1px solid rgba(0, 255, 100, 0.25);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 100, 0.6);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 255, 100, 0.1);
            background: rgba(255, 255, 255, 0.06);
        }

        .card-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 26px;
            font-weight: 600;
            color: #00ff64;
            margin-bottom: 24px;
        }

        .card-button {
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.15), rgba(0, 212, 255, 0.15));
            border: 1px solid rgba(0, 255, 100, 0.4);
            border-radius: 40px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            color: #00ff64;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            width: 100%;
            max-width: 220px;
            margin: 0 auto;
        }

        .card-button:hover {
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.25), rgba(0, 212, 255, 0.25));
            border-color: #00ff64;
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.3);
        }

        .card-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button--loading {
            position: relative;
        }

        .button--loading .button__text {
            visibility: hidden;
        }

        .button--loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid #00ff64;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(255, 50, 50, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #ff4444;
            border-radius: 16px;
            padding: 12px 20px;
            color: white;
            text-align: center;
            z-index: 9999;
            font-size: 14px;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #4a6a55;
            margin-top: 20px;
        }

        @media (max-width: 500px) {
            .logo { font-size: 32px; -webkit-text-stroke: 1.5px #00ff64; }
            .logo-image { width: 130px; }
            .card-title { font-size: 22px; }
            .card-icon { font-size: 52px; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="static-bg"></div>

    <div class="container">
        <div class="header">
            <div class="logo">AmneziaWG Generator</div>
            <img class="logo-image" src="https://warp-generator.github.io/logo.svg" alt="logo" onerror="this.style.display='none'">
        </div>

<div class="dynamic-stack">
    <div class="card">
        <div class="card-icon">💻📱</div>
        <div class="card-title">Генератор конфигураций</div>
        
        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px;">
            <button id="generatePc" class="card-button" style="margin: 0;">
                <span class="button__text">Для Компьютера</span>
            </button>
            <button id="generateMobile" class="card-button" style="margin: 0;">
                <span class="button__text">Для Телефона</span>
            </button>
        </div>
    </div>
</div>

    <script>
        // Получение московского времени
        function getMoscowTimeString() {
            const now = new Date();
            const moscowTime = new Date(now.getTime() + (3 * 60 * 60 * 1000));
            const hours = String(moscowTime.getUTCHours()).padStart(2, '0');
            const minutes = String(moscowTime.getUTCMinutes()).padStart(2, '0');
            return `${hours}_${minutes}`;
        }

        // Скачивание файла
        function downloadFile(content, fileName) {
            const blob = new Blob([content], { type: 'application/x-wireguard-profile' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Показать ошибку
        function showError(message) {
            const toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.textContent = `❌ ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // Генерация конфига через API (ваш warp.js бэкенд)
        async function generateConfig(configType, buttonId) {
            const button = document.getElementById(buttonId);
            const buttonText = button.querySelector('.button__text');
            const originalText = buttonText.textContent;
            
            button.disabled = true;
            button.classList.add("button--loading");

            try {
                // Определяем URL API (если вы не на Vercel, замените на свой)
                const apiUrl = '/api/warp';
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: configType })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success && data.content) {
                    // Декодируем base64 в строку конфига
                    const configContent = atob(data.content);
                    const moscowTime = getMoscowTimeString();
                    const devicePrefix = configType === 1 ? 'PC' : 'Mob';
                    const fileName = `AWG_${devicePrefix}_${moscowTime}.conf`;
                    
                    downloadFile(configContent, fileName);
                    
                    setTimeout(() => {
                        if (buttonText) buttonText.textContent = originalText;
                    }, 2000);
                } else {
                    throw new Error(data.message || 'Ошибка генерации конфига');
                }
            } catch (error) {
                console.error('Generation error:', error);
                showError(error.message || 'Ошибка при генерации. Проверьте соединение с сервером.');
                buttonText.textContent = `❌ Ошибка`;
                setTimeout(() => {
                    if (buttonText) buttonText.textContent = originalText;
                }, 2000);
            } finally {
                button.disabled = false;
                button.classList.remove("button--loading");
            }
        }

        // Назначение обработчиков
        document.getElementById('generatePc')?.addEventListener('click', (e) => {
            e.stopPropagation();
            generateConfig(1, 'generatePc');
        });

        document.getElementById('generateMobile')?.addEventListener('click', (e) => {
            e.stopPropagation();
            generateConfig(2, 'generateMobile');
        });

        // Ripple эффект на карточках
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(0, 255, 100, 0.2)';
                ripple.style.width = '10px';
                ripple.style.height = '10px';
                ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                ripple.style.animation = 'ripple 0.6s ease-out';
                ripple.style.left = e.clientX - card.getBoundingClientRect().left + 'px';
                ripple.style.top = e.clientY - card.getBoundingClientRect().top + 'px';
                card.style.position = 'relative';
                card.style.overflow = 'hidden';
                card.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: translate(-50%, -50%) scale(30);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
