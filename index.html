<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AmneziaWG Config Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🚀 AmneziaWG Config Generator</h1>
        <p class="subtitle">Выберите тип конфигурации</p>
        
        <div class="buttons-grid">
            <button id="generateButton1" class="config-button">
                <span class="button-icon">📡</span>
                <div class="button-content">
                    <span class="button-title">AmneziaWG (Стандарт)</span>
                    <span class="button-desc">Оптимальные настройки для всех устройств</span>
                </div>
                <span class="button__text">Скачать</span>
            </button>

            <button id="generateButton2" class="config-button">
                <span class="button-icon">📱</span>
                <div class="button-content">
                    <span class="button-title">AmneziaWG (Мобильный)</span>
                    <span class="button-desc">Оптимизирован для телефонов</span>
                </div>
                <span class="button__text">Скачать</span>
            </button>
        </div>

        <div id="status" class="status"></div>
        <div id="info" class="info"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
