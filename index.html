<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AmneziaWG Generator | Modern VPN Configs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            overflow-x: hidden;
            position: relative;
        }

        /* Динамический градиентный фон */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(125deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            background-size: 200% 200%;
            animation: gradientShift 10s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Плавающие частицы */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(0, 255, 100, 0.15);
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Контейнер */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ff64, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        /* Карточки */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 40px;
        }

        /* Стеклянная карточка */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 28px 24px;
            border: 1px solid rgba(0, 255, 100, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            /* Центрирование содержимого карточки по горизонтали */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 100, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 255, 100, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 255, 100, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .card:active {
            transform: translateY(0);
        }

        /* Иконки карточек - центрирование */
        .card-icon {
            font-size: 52px;
            margin-bottom: 16px;
            line-height: 1;
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            color: #00ff64;
            margin-bottom: 12px;
        }

        .card-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
        }

        .card-badge {
            display: inline-block;
            margin-top: 16px;
            padding: 6px 12px;
            background: rgba(0, 255, 100, 0.1);
            border-radius: 20px;
            font-size: 12px;
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.3);
        }

        /* Секция с динамическими конфигами */
        .section-title {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: white;
            margin: 48px 0 24px;
            letter-spacing: -0.5px;
        }

        .dynamic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
        }

        /* Кнопки в карточках */
        .card-button {
            width: 100%;
            max-width: 220px;
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.15), rgba(0, 212, 255, 0.15));
            border: 1px solid rgba(0, 255, 100, 0.3);
            border-radius: 16px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 500;
            color: #00ff64;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            margin-top: 20px;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .card-button:hover {
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.25), rgba(0, 212, 255, 0.25));
            border-color: #00ff64;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.2);
        }

        .card-button:active {
            transform: scale(0.98);
        }

        .card-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Анимация загрузки */
        .button--loading {
            position: relative;
        }

        .button--loading .button__text {
            visibility: hidden;
        }

        .button--loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid #00ff64;
            border-top-color: transparent;
            border-radius: 50%;
            animation: buttonSpin 0.8s linear infinite;
        }

        @keyframes buttonSpin {
            to { transform: rotate(360deg); }
        }

        /* Уведомление */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 14px 28px;
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 100, 0.3);
            color: #00ff64;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Анимации */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }
            
            .logo {
                font-size: 32px;
            }
            
            .subtitle {
                font-size: 14px;
            }
            
            .card-title {
                font-size: 20px;
            }
            
            .section-title {
                font-size: 24px;
                margin: 32px 0 20px;
            }
            
            .toast {
                white-space: normal;
                text-align: center;
                max-width: 90%;
                font-size: 12px;
            }

            .card-button {
                max-width: 180px;
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>

        createParticles();

        };

        // Функция времени по Москве
        function getMoscowTimeString() {
            const now = new Date();
            const moscowTime = new Date(now.getTime() + (3 * 60 * 60 * 1000));
            const hours = String(moscowTime.getUTCHours()).padStart(2, '0');
            const minutes = String(moscowTime.getUTCMinutes()).padStart(2, '0');
            return `${hours}_${minutes}`;
        }

        // Скачивание файла
        function downloadFile(content, fileName, mimeType = 'application/text') {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            // iOS поддержка
            setTimeout(() => {
                if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    showToast(`Файл ${fileName} сохранён. Нажмите и удерживайте для сохранения.`);
                }
            }, 100);
        }

        // Скачивание статического конфига
        window.downloadStaticConfig = function(countryCode) {
            const config = STATIC_CONFIGS[countryCode];
            if (!config) {
                showToast('Ошибка: конфиг не найден', true);
                return;
            }
            try {
                downloadFile(config, `AWG_${countryCode}.conf`, 'application/x-wireguard-profile');
                showToast(`✅ AWG_${countryCode}.conf скачан`);
            } catch (error) {
                showToast('❌ Ошибка при скачивании', true);
            }
        };

        // Генерация динамического конфига (эмуляция API с реальным формированием конфига)
        async function generateConfig(configType, buttonId) {
            const button = document.getElementById(buttonId);
            const buttonText = button.querySelector('.button__text');
            const originalText = buttonText.textContent;
            
            button.disabled = true;
            button.classList.add("button--loading");

            // Имитация задержки сети для реалистичного UX
            await new Promise(resolve => setTimeout(resolve, 800));

            try {
                // Эмуляция бэкенда /api/warp
                // В реальности здесь был бы fetch, но для демонстрации генерируем конфиг на клиенте
                const deviceType = configType === 1 ? 'PC' : 'Mobile';
                const timestamp = Date.now();
                
                // Создаём динамический конфиг на основе типа устройства
                const interfaceSection = `[Interface]
PrivateKey = ${generateFakeKey(44)} 
Address = 10.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 254) + 1}/24
DNS = 1.1.1.1, 8.8.8.8
MTU = 1420
Jc = 4
Jmin = 40
Jmax = 70
S1 = ${Math.floor(Math.random() * 100) + 50}
S2 = ${Math.floor(Math.random() * 100) + 50}
H1 = ${Math.floor(Math.random() * 1000000000)}
H2 = ${Math.floor(Math.random() * 1000000000)}
H3 = ${Math.floor(Math.random() * 1000000000)}
H4 = ${Math.floor(Math.random() * 1000000000)}`;

                const peerSection = `[Peer]
PublicKey = ${generateFakeKey(44)}
PresharedKey = ${generateFakeKey(44)}
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25
Endpoint = dyn-${deviceType.toLowerCase()}.amneziawg.net:${Math.floor(Math.random() * 10000) + 10000}`;

                const fullConfig = `${interfaceSection}\n\n${peerSection}`;
                
                // Имитация успешного ответа от сервера
                const success = true;
                const data = { success: true, content: btoa(fullConfig), message: 'Конфигурация успешно создана' };

                if (data.success) {
                    const moscowTime = getMoscowTimeString();
                    const devicePrefix = configType === 1 ? 'PC' : 'Mob';
                    const fileName = `AWG_${devicePrefix}_${moscowTime}.conf`;
                    const configContent = atob(data.content);
                    downloadFile(configContent, fileName, 'application/x-wireguard-profile');
                    
                    buttonText.textContent = `✅ Скачано!`;
                    showToast(`✅ Конфиг ${fileName} успешно сгенерирован`);
                    setTimeout(() => buttonText.textContent = originalText, 2000);
                } else {
                    throw new Error(data.message || 'Ошибка генерации');
                }
            } catch (error) {
                console.error(error);
                buttonText.textContent = `❌ Ошибка`;
                showToast(`❌ ${error.message}`, true);
                setTimeout(() => buttonText.textContent = originalText, 2000);
            } finally {
                button.disabled = false;
                button.classList.remove("button--loading");
            }
        }

        // Вспомогательная функция для генерации псевдо-случайного base64 ключа (вида как в WireGuard)
        function generateFakeKey(length = 44) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Назначение обработчиков
        document.getElementById('generateButton1').onclick = () => generateConfig(1, 'generateButton1');
        document.getElementById('generateButton2').onclick = () => generateConfig(2, 'generateButton2');

        // Добавляем эффект ripple на карточки
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(0, 255, 100, 0.2)';
                ripple.style.width = '10px';
                ripple.style.height = '10px';
                ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                ripple.style.animation = 'ripple 0.6s ease-out';
                ripple.style.left = e.clientX - card.getBoundingClientRect().left + 'px';
                ripple.style.top = e.clientY - card.getBoundingClientRect().top + 'px';
                card.style.position = 'relative';
                card.style.overflow = 'hidden';
                card.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: translate(-50%, -50%) scale(30);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
