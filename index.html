<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmneziaWG Config Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Добавляем фоновое изображение -->
    <div class="fullscreen-bg"></div>
    
    <!-- Затемнение поверх картинки, чтобы текст читался (опционально) -->
    <div class="overlay"></div>

    <div class="container">
        <h1>AmneziaWG Generator</h1>
        <p class="subtitle">Выберите устройство для генерации конфигурации</p>
        
        <div class="buttons-grid">
            <button class="config-button">
                <span class="button-icon">🖥️</span>
                <div class="button-content">
                    <div class="button-title">Компьютер</div>
                    <div class="button-desc">Windows, macOS, Linux</div>
                </div>
                <span class="button__text">Сгенерировать</span>
            </button>

            <button class="config-button">
                <span class="button-icon">📱</span>
                <div class="button-content">
                    <div class="button-title">Телефон</div>
                    <div class="button-desc">iOS, Android</div>
                </div>
                <span class="button__text">Сгенерировать</span>
            </button>
        </div>

        <div class="divider">
            <span>статические серверы</span>
        </div>

        <div class="static-buttons-row">
            <button class="config-button static">
                <span class="flag-icon flag-fi"></span>
                <span class="button-title-static">Финляндия</span>
            </button>
            <button class="config-button static">
                <span class="flag-icon flag-de"></span>
                <span class="button-title-static">Германия</span>
            </button>
        </div>
    </div>

</body>
</html>
